name: Deploy Vora.IA to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Artifact Registry repository
        run: |
          gcloud artifacts repositories create vora-ia \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} || true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      # ───────────────────────────────────
      # Backend (FastAPI)
      # ───────────────────────────────────
      - name: Pull previous Backend image (cache)
        run: |
          docker pull ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:latest || true

      - name: Build Backend Docker image
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:latest \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:latest \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:${{ github.sha }} \
            ./backend

      - name: Push Backend Docker images
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:latest
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy vora-backend \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --port 8000 \
            --set-env-vars "\
          ENVIRONMENT=production,\
          DEBUG=false,\
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},\
          OPENAI_MODEL=gpt-4o,\
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }},\
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }},\
          SUPABASE_URL=${{ secrets.SUPABASE_URL }},\
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }},\
          SECRET_KEY=${{ secrets.SECRET_KEY }},\
          SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }},\
          APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }},\
          ALLOWED_ORIGINS=[\"*\"]"

      - name: Get Backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe vora-backend \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Backend deployed to: $URL"

      # ───────────────────────────────────
      # Frontend (Next.js)
      # ───────────────────────────────────
      - name: Pull previous Frontend image (cache)
        run: |
          docker pull ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:latest || true

      - name: Build Frontend Docker image
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend_url.outputs.url }} \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:latest \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:${{ github.sha }} \
            ./frontend

      - name: Push Frontend Docker images
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:latest
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy vora-frontend \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vora-ia/frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --port 3000

      # ───────────────────────────────────
      # Post-deploy
      # ───────────────────────────────────
      - name: Output deployment URLs
        run: |
          FRONTEND_URL=$(gcloud run services describe vora-frontend \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "══════════════════════════════════════"
          echo "✅ Backend:  ${{ steps.backend_url.outputs.url }}"
          echo "✅ Frontend: $FRONTEND_URL"
          echo "══════════════════════════════════════"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "══════ Backend Logs ══════"
          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=vora-backend" \
            --limit 50 \
            --format json \
            --project ${{ secrets.GCP_PROJECT_ID }} || true
          echo ""
          echo "══════ Frontend Logs ══════"
          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=vora-frontend" \
            --limit 50 \
            --format json \
            --project ${{ secrets.GCP_PROJECT_ID }} || true
